<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>推し活記録 - 予定を追加</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="app-header">
  <button class="icon-btn" onclick="location.href='calendar.html'">←</button>
  <span class="header-title">予定を追加</span>
  <div></div>
</header>
<main class="app-content">
  <div style="font-size:12px;color:var(--primary-dark);background:var(--primary-light);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:14px;">
    📅 未来の参戦予定を登録できます。過去の記録は参戦会場一覧から登録してください。
  </div>
  <div class="field">
    <label>会場名</label>
    <select id="venue" onchange="toggleOther()">
      <option value="">会場を選択</option>
      <option value="東京ドーム">東京ドーム</option>
      <option value="京セラドーム大阪">京セラドーム大阪</option>
      <option value="バンテリンドームナゴヤ">バンテリンドームナゴヤ</option>
      <option value="みずほPayPayドーム福岡">みずほPayPayドーム福岡</option>
      <option value="明治神宮野球場">明治神宮野球場</option>
      <option value="other">その他</option>
    </select>
  </div>
  <div class="field" id="other-wrap" style="display:none;">
    <label>会場名（自由入力）</label>
    <input type="text" id="venue-other" placeholder="例：さいたまスーパーアリーナ"/>
  </div>
  <div class="field"><label>公演名・ツアー名</label><input type="text" id="title" placeholder="例：〇〇 TOUR 2026 東京公演"/></div>
  <div class="field"><label>日付</label><input type="date" id="date"/></div>
  <div class="section-title">座席情報（任意）</div>
  <div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="field"><label>ブロック・エリア</label><input type="text" id="block" placeholder="例：アリーナB9"/></div>
      <div class="field"><label>列</label><input type="text" id="row" placeholder="例：12列"/></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="field"><label>番号</label><input type="text" id="num" placeholder="例：15番"/></div>
      <div class="field"><label>ゲート</label><input type="text" id="gate" placeholder="例：34"/></div>
    </div>
    <div class="field"><label>メモ（任意）</label><input type="text" id="memo" placeholder="例：アリーナ当選！絶対行く！"/></div>
  </div>
  <div id="msg" class="msg"></div>
  <button class="btn-primary" onclick="saveEvent()">予定を保存</button>
</main>

<script type="module">
import { requireAuth } from './js/auth-guard.js';
import { db } from './js/firebase.js';
import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

window.toggleOther = ()=>{ document.getElementById('other-wrap').style.display=document.getElementById('venue').value==='other'?'':'none'; };

let currentUser=null;
requireAuth(u=>{ currentUser=u; });

window.saveEvent = async ()=>{
  const vv=document.getElementById('venue').value;
  const venue=vv==='other'?document.getElementById('venue-other').value.trim():vv;
  const title=document.getElementById('title').value.trim();
  const date=document.getElementById('date').value;
  const msg=document.getElementById('msg');
  if(!date){msg.textContent='日付を入力してください';msg.className='msg error';return;}
  if(!venue&&!title){msg.textContent='会場またはタイトルを入力してください';msg.className='msg error';return;}
  const td=new Date();td.setHours(0,0,0,0);
  if(new Date(date)<=td){msg.textContent='未来の日付を選択してください（過去の記録は参戦会場一覧から）';msg.className='msg error';return;}
  msg.className='msg';
  try{
    await addDoc(collection(db,'calendar'),{
      uid:currentUser.uid,
      venue, title:title||(venue+' 参戦予定'), date,
      block:document.getElementById('block').value.trim(),
      row:document.getElementById('row').value.trim(),
      num:document.getElementById('num').value.trim(),
      gate:document.getElementById('gate').value.trim(),
      memo:document.getElementById('memo').value.trim(),
      createdAt:serverTimestamp(),
    });
    location.href='calendar.html';
  }catch(e){console.error(e);msg.textContent='保存に失敗しました';msg.className='msg error';}
};
</script>
</body>
</html>
