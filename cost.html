<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>推し活記録 - 費用管理</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<header class="app-header">
  <span class="header-title">&#x1F4B0; 費用管理</span>
  <div class="header-right">
    <select id="year-select" style="font-size:14px;border:1px solid var(--border);border-radius:8px;padding:4px 8px;background:var(--surface);color:var(--text);" onchange="loadCosts()"></select>
  </div>
</header>
<main class="app-content">
  <div class="stat-row">
    <div class="stat-box"><div class="stat-label">年間合計</div><div class="stat-value primary" id="year-total">-</div></div>
    <div class="stat-box"><div class="stat-label">参戦回数</div><div class="stat-value" id="year-count">-</div></div>
  </div>
  <div class="section-title">カテゴリ別内訳</div>
  <div class="card">
    <div class="chart-wrap"><canvas id="cost-chart"></canvas></div>
  </div>
  <div class="section-title">月別推移</div>
  <div class="card">
    <div class="chart-wrap"><canvas id="month-chart"></canvas></div>
  </div>
  <div id="detail-list"></div>
</main>
<nav class="bottom-nav">
  <a href="home.html" class="nav-item"><span class="nav-icon">&#x1F3E0;</span><span>ホーム</span></a>
  <a href="record.html" class="nav-item"><span class="nav-icon">&#x2795;</span><span>記録追加</span></a>
  <a href="cost.html" class="nav-item active"><span class="nav-icon">&#x1F4B0;</span><span>費用管理</span></a>
</nav>
<script type="module">
import { auth } from './js/firebase.js';
import { db } from './js/firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser = null;
let allRecords = [];
let pieChart = null, barChart = null;

const yearSel = document.getElementById('year-select');
const thisYear = new Date().getFullYear();
for (let y = thisYear; y >= thisYear - 5; y--) {
  const opt = document.createElement('option');
  opt.value = y; opt.textContent = y + '年';
  yearSel.appendChild(opt);
}

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;
  const q = query(collection(db, 'records'), where('uid', '==', user.uid));
  const snap = await getDocs(q);
  allRecords = snap.docs.map(d => ({id: d.id, ...d.data()}));
  loadCosts();
});

const catLabels = {ticket:'チケット代', goods:'グッズ代', travel:'遠征費', other:'その他'};
const catColors = ['#7B68EE','#FF8FAB','#FFB347','#69D2E7'];

window.loadCosts = function() {
  const year = parseInt(yearSel.value);
  const filtered = allRecords.filter(r => r.date && new Date(r.date).getFullYear() === year);
  const catTotals = {};
  const monthTotals = Array(12).fill(0);
  filtered.forEach(r => {
    const m = new Date(r.date).getMonth();
    (r.costs || []).forEach(c => {
      catTotals[c.category] = (catTotals[c.category] || 0) + (c.amount || 0);
      monthTotals[m] += (c.amount || 0);
    });
  });
  const total = Object.values(catTotals).reduce((a,b)=>a+b,0);
  document.getElementById('year-total').textContent = '¥' + total.toLocaleString();
  document.getElementById('year-count').textContent = filtered.length + '回';

  const catKeys = Object.keys(catTotals);
  if (pieChart) pieChart.destroy();
  if (barChart) barChart.destroy();

  if (catKeys.length === 0) {
    document.getElementById('detail-list').innerHTML = '<div class="empty-state"><div class="empty-icon">&#x1F4B8;</div><h3>この年の記録はありません</h3></div>';
    return;
  }

  pieChart = new Chart(document.getElementById('cost-chart'), {
    type: 'doughnut',
    data: {
      labels: catKeys.map(k => catLabels[k] || k),
      datasets: [{data: catKeys.map(k => catTotals[k]), backgroundColor: catColors, borderWidth: 0}]
    },
    options: {plugins: {legend: {position: 'bottom'}}, cutout: '60%'}
  });

  barChart = new Chart(document.getElementById('month-chart'), {
    type: 'bar',
    data: {
      labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
      datasets: [{label: '費用', data: monthTotals, backgroundColor: '#7B68EE', borderRadius: 6}]
    },
    options: {plugins: {legend: {display: false}}, scales: {y: {beginAtZero: true, ticks: {callback: v => '¥' + v.toLocaleString()}}}}
  });

  let detailHtml = '<div class="section-title">カテゴリ別合計</div>';
  catKeys.forEach((k, i) => {
    const pct = total > 0 ? Math.round(catTotals[k] / total * 100) : 0;
    detailHtml += '<div class="card" style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;">' +
      '<div style="display:flex;align-items:center;gap:10px;"><div style="width:12px;height:12px;border-radius:50%;background:' + catColors[i % catColors.length] + '"></div>' +
      '<span>' + (catLabels[k] || k) + '</span></div>' +
      '<div style="text-align:right"><div style="font-weight:700;color:var(--primary)">¥' + catTotals[k].toLocaleString() + '</div>' +
      '<div style="font-size:12px;color:var(--text-hint)">' + pct + '%</div></div></div>';
  });
  document.getElementById('detail-list').innerHTML = detailHtml;
};
</script>
</body>
</html>
