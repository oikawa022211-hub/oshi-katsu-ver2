<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>推し活記録 - 座席を記録</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="app-header">
  <button class="icon-btn" onclick="history.back()">←</button>
  <span class="header-title">座席を記録</span>
  <div></div>
</header>
<main class="app-content">
  <div id="msg" class="msg"></div>

  <div class="section-title">会場・公演情報</div>
  <div class="card">
    <div class="field">
      <label>会場名</label>
      <select id="venue" onchange="toggleOther()">
        <option value="">会場を選択</option>
        <option value="東京ドーム">東京ドーム</option>
        <option value="京セラドーム大阪">京セラドーム大阪</option>
        <option value="バンテリンドームナゴヤ">バンテリンドームナゴヤ</option>
        <option value="みずほPayPayドーム福岡">みずほPayPayドーム福岡</option>
        <option value="明治神宮野球場">明治神宮野球場</option>
        <option value="other">その他（自由入力）</option>
      </select>
    </div>
    <div class="field" id="other-wrap" style="display:none;">
      <label>会場名（自由入力）</label>
      <input type="text" id="venue-other" placeholder="例：さいたまスーパーアリーナ"/>
    </div>
    <div class="field">
      <label>公演名・ツアー名（任意）</label>
      <input type="text" id="live" placeholder="例：〇〇 TOUR 2026"/>
    </div>
    <div class="field">
      <label>日付</label>
      <input type="date" id="date"/>
    </div>
  </div>

  <div class="section-title">座席情報</div>
  <div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="field"><label>ブロック・エリア</label><input type="text" id="block" placeholder="例：1塁B / アリーナB9"/></div>
      <div class="field"><label>列</label><input type="text" id="row" placeholder="例：12列"/></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="field"><label>番号</label><input type="text" id="num" placeholder="例：15番"/></div>
      <div class="field"><label>ゲート（任意）</label><input type="text" id="gate" placeholder="例：34"/></div>
    </div>
    <div class="field">
      <label>メモ（任意）</label>
      <textarea id="memo" placeholder="例：ステージ真正面！最高だった！"></textarea>
    </div>
  </div>

  <button class="btn-primary" id="btn-save" onclick="saveSeat()">保存する</button>
</main>

<script type="module">
import { requireAuth } from './js/auth-guard.js';
import { db } from './js/firebase.js';
import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

document.getElementById('date').value = new Date().toISOString().split('T')[0];

window.toggleOther = function() {
  document.getElementById('other-wrap').style.display =
    document.getElementById('venue').value === 'other' ? '' : 'none';
};

let currentUser = null;
requireAuth((user) => { currentUser = user; });

window.saveSeat = async function() {
  const venueVal = document.getElementById('venue').value;
  const venue    = venueVal === 'other'
    ? document.getElementById('venue-other').value.trim()
    : venueVal;
  const date     = document.getElementById('date').value;
  const msg      = document.getElementById('msg');

  if (!venue) { msg.textContent='会場を選択してください'; msg.className='msg error'; return; }
  if (!date)  { msg.textContent='日付を入力してください'; msg.className='msg error'; return; }
  msg.className = 'msg';

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '保存中…';
  try {
    await addDoc(collection(db, 'seats'), {
      uid:   currentUser.uid,
      venue,
      live:  document.getElementById('live').value.trim(),
      date,
      block: document.getElementById('block').value.trim(),
      row:   document.getElementById('row').value.trim(),
      num:   document.getElementById('num').value.trim(),
      gate:  document.getElementById('gate').value.trim(),
      memo:  document.getElementById('memo').value.trim(),
      createdAt: serverTimestamp(),
    });
    location.href = 'venues.html';
  } catch(e) {
    console.error(e);
    msg.textContent = '保存に失敗しました。もう一度お試しください';
    msg.className   = 'msg error';
    btn.disabled = false; btn.textContent = '保存する';
  }
};
</script>
</body>
</html>
