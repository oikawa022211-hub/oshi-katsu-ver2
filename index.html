<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>推し活記録 - ログイン</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>" />
</head>
<body>

<div class="auth-page">
  <div class="auth-logo">
    <div class="logo-icon">💜</div>
    <h1>推し活記録</h1>
    <p>あなたの推し活を、美しく残す</p>
  </div>

  <div class="auth-card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">ログイン</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">新規登録</button>
    </div>

    <div id="msg" class="msg"></div>

    <!-- ログインフォーム -->
    <div id="form-login">
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="login-email" placeholder="oshi@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="login-password" placeholder="パスワード" autocomplete="current-password" />
      </div>
      <div class="forgot-link" onclick="forgotPassword()">パスワードを忘れた方</div>
      <button class="btn-primary" id="btn-login" onclick="login()">ログイン</button>
      <div class="divider">または</div>
      <button class="btn-google" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Googleで続ける
      </button>
    </div>

    <!-- 新規登録フォーム -->
    <div id="form-register" style="display:none;">
      <div class="field">
        <label>ニックネーム</label>
        <input type="text" id="reg-name" placeholder="推し活ネームでもOK！" />
      </div>
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="reg-email" placeholder="oshi@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="reg-password" placeholder="英数字8文字以上" autocomplete="new-password" />
      </div>
      <button class="btn-primary" id="btn-register" onclick="register()">アカウントを作成</button>
      <p class="terms">登録することで<a href="#">利用規約</a>および<a href="#">プライバシーポリシー</a>に同意したものとみなします</p>
    </div>
  </div>
</div>

<script type="module">
import { auth } from './js/firebase.js';
import {
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signInWithPopup,
  GoogleAuthProvider,
  sendPasswordResetEmail,
  onAuthStateChanged,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ログイン済みなら home.html へ
onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = 'home.html';
});

const provider = new GoogleAuthProvider();

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading
    ? '処理中…'
    : btnId === 'btn-login' ? 'ログイン' : 'アカウントを作成';
}

window.switchTab = function(tab) {
  document.getElementById('tab-login').className  = 'tab-btn' + (tab === 'login' ? ' active' : '');
  document.getElementById('tab-register').className = 'tab-btn' + (tab === 'register' ? ' active' : '');
  document.getElementById('form-login').style.display    = tab === 'login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('msg').className = 'msg';
};

window.login = async function() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email)    return showMsg('メールアドレスを入力してください', 'error');
  if (!password) return showMsg('パスワードを入力してください', 'error');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
    return showMsg('メールアドレスの形式が正しくありません', 'error');
  setLoading('btn-login', true);
  try {
    await signInWithEmailAndPassword(auth, email, password);
    // onAuthStateChanged が home.html へリダイレクト
  } catch (e) {
    setLoading('btn-login', false);
    showMsg(getErrorMessage(e.code), 'error');
  }
};

window.register = async function() {
  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!name)     return showMsg('ニックネームを入力してください', 'error');
  if (!email)    return showMsg('メールアドレスを入力してください', 'error');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
    return showMsg('メールアドレスの形式が正しくありません', 'error');
  if (!password) return showMsg('パスワードを入力してください', 'error');
  if (password.length < 8) return showMsg('パスワードは8文字以上で入力してください', 'error');
  if (!/[a-zA-Z]/.test(password) || !/[0-9]/.test(password))
    return showMsg('パスワードは英字と数字を両方含めてください', 'error');
  setLoading('btn-register', true);
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    // onAuthStateChanged が home.html へリダイレクト
  } catch (e) {
    setLoading('btn-register', false);
    showMsg(getErrorMessage(e.code), 'error');
  }
};

window.loginWithGoogle = async function() {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') showMsg(getErrorMessage(e.code), 'error');
  }
};

window.forgotPassword = async function() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) return showMsg('メールアドレスを入力してください', 'error');
  try {
    await sendPasswordResetEmail(auth, email);
    showMsg('再設定メールを送信しました。メールをご確認ください。', 'success');
  } catch (e) {
    showMsg(getErrorMessage(e.code), 'error');
  }
};

function getErrorMessage(code) {
  const messages = {
    // ログイン
    'auth/user-not-found':         'このメールアドレスは登録されていません',
    'auth/wrong-password':         'パスワードが正しくありません',
    'auth/invalid-credential':     'メールアドレスまたはパスワードが正しくありません',
    'auth/invalid-email':          'メールアドレスの形式が正しくありません',
    'auth/user-disabled':          'このアカウントは無効になっています。サポートにお問い合わせください',
    // 新規登録
    'auth/email-already-in-use':   'このメールアドレスはすでに使用されています',
    'auth/weak-password':          'パスワードは8文字以上で設定してください',
    'auth/operation-not-allowed':  'この認証方法は現在使用できません',
    // 共通
    'auth/too-many-requests':      'ログイン試行回数が多すぎます。しばらく時間をおいて再度お試しください',
    'auth/network-request-failed': 'ネットワークエラーが発生しました。接続を確認してください',
    'auth/popup-blocked':          'ポップアップがブロックされました。ブラウザの設定を確認してください',
    'auth/cancelled-popup-request':'ログインがキャンセルされました',
    'auth/internal-error':         'サーバーエラーが発生しました。しばらく時間をおいて再度お試しください',
  };
  return messages[code] || 'エラーが発生しました（' + code + '）。もう一度お試しください';
}
</script>
</body>
</html>
