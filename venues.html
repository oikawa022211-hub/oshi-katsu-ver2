<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>推し活記録 - 参戦会場一覧</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="app-header">
  <button class="icon-btn" onclick="location.href='home.html'">←</button>
  <span class="header-title">参戦会場一覧</span>
  <button class="icon-btn" onclick="location.href='seat-add.html'" title="座席を追加" style="background:var(--primary);color:white;font-size:1.2rem;">＋</button>
</header>

<main class="app-content">
  <div class="stat-row">
    <div class="stat-box"><div class="stat-label">今年の参戦回数</div><div class="stat-value primary" id="year-count">-</div></div>
    <div class="stat-box"><div class="stat-label">参戦会場数</div><div class="stat-value primary" id="venue-count">-</div></div>
  </div>
  <div class="section-title">参戦会場</div>
  <div id="venue-list">
    <div class="loading"><div class="spinner"></div>読み込み中…</div>
  </div>
</main>

<script type="module">
import { requireAuth } from './js/auth-guard.js';
import { db } from './js/firebase.js';
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const VENUE_ICONS = {
  '東京ドーム':'🗼','京セラドーム大阪':'🏯',
  'バンテリンドームナゴヤ':'⛩️','みずほPayPayドーム福岡':'🌊','明治神宮野球場':'⚾'
};

requireAuth(async (user) => {
  const uid = user.uid;
  const thisYear = new Date().getFullYear();
  try {
    // orderBy削除（インデックス不要）→ JS側でソート
    const snap = await getDocs(
      query(collection(db, 'seats'), where('uid','==',uid))
    );
    const seats = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // 会場ごとにグループ化
    const map = {};
    let yearCount = 0;
    seats.forEach(s => {
      if (!map[s.venue]) map[s.venue] = [];
      map[s.venue].push(s);
      if (s.date && new Date(s.date).getFullYear() === thisYear) yearCount++;
    });

    document.getElementById('year-count').textContent  = yearCount + '回';
    document.getElementById('venue-count').textContent = Object.keys(map).length + '箇所';

    const list = document.getElementById('venue-list');
    if (Object.keys(map).length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🏟️</div>
        <h3>まだ記録がありません</h3>
        <p>右上の＋ボタンから最初の座席を記録しよう！</p>
      </div>`;
      return;
    }

    list.innerHTML = Object.entries(map).map(([venue, recs]) => {
      const icon = VENUE_ICONS[venue] || '🎵';
      return `<div class="card" style="cursor:pointer;margin-bottom:10px;" onclick="location.href='venue-detail.html?venue=${encodeURIComponent(venue)}'">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:44px;height:44px;background:var(--primary-light);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${icon}</div>
          <div style="flex:1;">
            <div style="font-size:15px;font-weight:700;">${venue}</div>
            <div style="font-size:12px;color:var(--text-hint);margin-top:2px;">${recs.length}回参戦</div>
          </div>
          <span style="color:var(--text-hint);font-size:18px;">›</span>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    console.error(e);
    document.getElementById('venue-list').innerHTML = '<p style="color:var(--text-hint);text-align:center;padding:2rem;">読み込みに失敗しました</p>';
  }
});
</script>
</body>
</html>
