<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>推し活記録 - カレンダー</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="app-header">
  <button class="icon-btn" onclick="location.href='home.html'">←</button>
  <span class="header-title">推し活カレンダー</span>
  <button class="icon-btn" onclick="location.href='cal-add.html'" style="background:var(--primary);color:white;font-size:1.2rem;">＋</button>
</header>
<main class="app-content">
  <div style="font-size:11px;color:var(--primary-dark);background:var(--primary-light);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:12px;">
    💡 座席登録した日付は自動でカレンダーに反映されます
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <button class="icon-btn" onclick="calNav(-1)">‹</button>
      <span style="font-size:16px;font-weight:700;" id="cal-lbl"></span>
      <button class="icon-btn" onclick="calNav(1)">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;" id="cal-labels"></div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:4px;" id="cal-cells"></div>
    <div id="cal-detail" style="background:var(--primary-light);border-radius:var(--radius-sm);padding:10px 12px;margin-top:10px;display:none;"></div>
  </div>
  <div class="section-title">今月の予定</div>
  <div id="cal-events"></div>
</main>

<script type="module">
import { requireAuth } from './js/auth-guard.js';
import { db } from './js/firebase.js';
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const pad = n => String(n).padStart(2,'0');
const today = new Date();
let calY = today.getFullYear(), calM = today.getMonth();
let seats = [], calEvs = {};

requireAuth(async (user) => {
  const uid = user.uid;
  const [sSnap, cSnap] = await Promise.all([
    getDocs(query(collection(db,'seats'), where('uid','==',uid))),
    getDocs(query(collection(db,'calendar'), where('uid','==',uid))),
  ]);
  seats = sSnap.docs.map(d=>({id:d.id,...d.data()}));
  cSnap.docs.forEach(d=>{ const v=d.data(); calEvs[v.date]=v; });
  renderCal();
});

function getAllEvs(){
  const m={};
  seats.forEach(s=>{if(!s.date)return;if(!m[s.date])m[s.date]=[];m[s.date].push({type:'seat',title:s.live||s.venue,venue:s.venue,seat:[s.block,s.row,s.num].filter(Boolean).join(' · ')});});
  Object.entries(calEvs).forEach(([k,v])=>{if(!m[k])m[k]=[];m[k].push({type:'plan',title:v.title,venue:v.venue||''});});
  return m;
}

window.calNav = d=>{calM+=d;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderCal();};

function renderCal(){
  const all=getAllEvs();
  document.getElementById('cal-lbl').textContent=calY+'年'+(calM+1)+'月';
  const DL=['日','月','火','水','木','金','土'];
  document.getElementById('cal-labels').innerHTML=DL.map((d,i)=>`<div style="text-align:center;font-size:10px;color:${i===0?'var(--accent)':i===6?'var(--primary)':'var(--text-hint)'};padding:3px 0;">${d}</div>`).join('');
  const first=new Date(calY,calM,1).getDay(),days=new Date(calY,calM+1,0).getDate();
  let h='';
  for(let i=0;i<first;i++)h+='<div></div>';
  for(let d=1;d<=days;d++){
    const ds=calY+'-'+pad(calM+1)+'-'+pad(d);
    const isT=d===today.getDate()&&calM===today.getMonth()&&calY===today.getFullYear();
    const hasEv=!!(all[ds]&&all[ds].length);
    const dow=(first+d-1)%7;
    const color=isT?'':(dow===0?'color:var(--accent);':dow===6?'color:var(--primary);':'color:var(--text);');
    const bg=isT?'background:var(--primary);color:white;font-weight:700;':'cursor:pointer;';
    const dot=hasEv?'<div style="width:4px;height:4px;background:'+(isT?'white':'var(--accent)')+';border-radius:50%;position:absolute;bottom:2px;left:50%;transform:translateX(-50%);"></div>':''
    h+=`<div onclick="calClick('${ds}',${d})" style="aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;position:relative;${bg}${color}">${d}${dot}</div>`;
  }
  document.getElementById('cal-cells').innerHTML=h;
  const pfx=calY+'-'+pad(calM+1)+'-';
  const evs=Object.entries(all).filter(([k])=>k.startsWith(pfx)).sort((a,b)=>a[0]>b[0]?1:-1);
  const el=document.getElementById('cal-events');
  if(!evs.length){el.innerHTML='<div class="empty-state" style="padding:1.5rem 0;"><div class="empty-icon">📅</div><p>今月の予定はありません</p></div>';return;}
  el.innerHTML=evs.map(([k,evList])=>evList.map(ev=>{
    const d=parseInt(k.split('-')[2]);
    return `<div class="card" style="margin-bottom:8px;display:flex;align-items:center;gap:10px;">
      <div style="width:36px;height:36px;background:var(--primary-light);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--primary-dark);">${d}日</div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:500;">${ev.title||'—'}</div>
        ${ev.venue?`<div style="font-size:11px;color:var(--text-hint);">📍 ${ev.venue}</div>`:''}
        ${ev.type==='seat'&&ev.seat?`<div style="font-size:11px;color:var(--text-hint);">💺 ${ev.seat}</div>`:''}
        <span style="font-size:10px;padding:1px 7px;border-radius:10px;${ev.type==='seat'?'background:var(--primary-light);color:var(--primary-dark);':' background:#FFF3E0;color:#633806;'}">${ev.type==='seat'?'座席登録':'参戦予定'}</span>
      </div>
    </div>`;
  }).join('') ).join('');
  document.getElementById('cal-detail').style.display='none';
}

window.calClick = (ds,d)=>{
  const all=getAllEvs(); const evList=all[ds]; const det=document.getElementById('cal-detail');
  det.style.display='';
  if(!evList||!evList.length){det.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:12px;color:var(--text-hint);">${calM+1}月${d}日 — 予定なし</span><a href="cal-add.html" style="background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:5px 12px;font-size:12px;text-decoration:none;">+ 追加</a></div>`;return;}
  det.innerHTML=evList.map(ev=>`<div style="margin-bottom:7px;"><div style="font-size:13px;font-weight:600;">${ev.title||'—'}</div>${ev.venue?`<div style="font-size:11px;color:var(--text-sub);">📍 ${ev.venue}</div>`:''}</div>`).join('')+`<a href="cal-add.html" style="font-size:12px;color:var(--primary);">+ この日に予定を追加</a>`;
};
</script>
</body>
</html>
