<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="推し活記録"/>
  <meta name="theme-color" content="#7B68EE"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>推し活記録 - 会場詳細</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="app-header">
  <button class="icon-btn" onclick="location.href='venues.html'">←</button>
  <span class="header-title" id="page-title">会場詳細</span>
  <button class="icon-btn" onclick="location.href='seat-add.html'" style="background:var(--primary);color:white;font-size:1.2rem;" title="追加">＋</button>
</header>
<main class="app-content">
  <div id="detail-list"><div class="loading"><div class="spinner"></div>読み込み中…</div></div>
</main>

<script type="module">
import { requireAuth } from './js/auth-guard.js';
import { db } from './js/firebase.js';
import {
  collection, query, where, getDocs, doc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const VENUE_ICONS = {
  '東京ドーム':'🗼','京セラドーム大阪':'🏯',
  'バンテリンドームナゴヤ':'⛩️','みずほPayPayドーム福岡':'🌊','明治神宮野球場':'⚾'
};

const params = new URLSearchParams(location.search);
const venue  = params.get('venue') || '';
const icon   = VENUE_ICONS[venue] || '🎵';
document.getElementById('page-title').textContent = icon + ' ' + venue;

requireAuth(async (user) => {
  const uid = user.uid;
  try {
    // orderBy削除（インデックス不要）→ JS側でソート
    const snap = await getDocs(
      query(collection(db,'seats'), where('uid','==',uid), where('venue','==',venue))
    );
    // JS側で日付降順ソート
    const seats = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a,b) => (b.date||'').localeCompare(a.date||''));
    const list  = document.getElementById('detail-list');

    if (seats.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">${icon}</div><h3>まだ記録がありません</h3></div>`;
      return;
    }

    list.innerHTML = `<div style="font-size:12px;color:var(--text-hint);margin-bottom:12px;">${seats.length}回の参戦記録</div>` +
      seats.map((s, i) => {
        const dateStr = s.date ? new Date(s.date).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}) : '日付不明';
        const parts   = [s.block, s.row, s.num].filter(Boolean).join(' · ');
        return `<div class="card" style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
            <div>
              ${i===0 ? '<span style="background:var(--primary);color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:6px;">最新</span>' : ''}
              <div style="font-size:12px;color:var(--text-hint);">${dateStr}</div>
            </div>
            <div style="display:flex;gap:8px;">
              <button onclick="location.href='seat-edit.html?id=${s.id}'"
                style="border:none;background:var(--primary-light);color:var(--primary);border-radius:var(--radius-sm);padding:5px 10px;font-size:11px;cursor:pointer;">✏️ 編集</button>
              <button onclick="deleteSeat('${s.id}')"
                style="border:none;background:#FCEBEB;color:#E24B4A;border-radius:var(--radius-sm);padding:5px 10px;font-size:11px;cursor:pointer;">🗑 削除</button>
            </div>
          </div>
          <div style="font-size:16px;font-weight:700;">${parts || '座席未記録'}</div>
          ${s.gate ? `<div style="font-size:12px;color:var(--text-sub);margin-top:4px;">🚪 ${s.gate}ゲート</div>` : ''}
          ${s.live ? `<div style="font-size:12px;color:var(--primary);margin-top:4px;">🎤 ${s.live}</div>` : ''}
          ${s.memo ? `<div style="font-size:11px;color:var(--text-sub);margin-top:8px;padding:8px;background:var(--surface2);border-radius:var(--radius-sm);">💬 ${s.memo}</div>` : ''}
        </div>`;
      }).join('');

    window.deleteSeat = async (id) => {
      if (!confirm('この座席記録を削除しますか？')) return;
      try {
        await deleteDoc(doc(db, 'seats', id));
        location.reload();
      } catch(e) {
        alert('削除に失敗しました');
      }
    };
  } catch(e) {
    console.error(e);
    document.getElementById('detail-list').innerHTML = '<p style="color:var(--text-hint);text-align:center;padding:2rem;">読み込みに失敗しました</p>';
  }
});
</script>
</body>
</html>
