<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>推し活記録 - 記録追加</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="app-header">
  <button class="icon-btn" onclick="history.back()">&#x2190;</button>
  <span class="header-title">参戦記録を追加</span>
  <div></div>
</header>
<main class="app-content">
  <div id="msg" class="msg"></div>

  <div class="section-title">基本情報</div>
  <div class="card">
    <div class="field">
      <label>アーティスト名</label>
      <input type="text" id="artistName" placeholder="例：〇〇〇" />
    </div>
    <div class="field">
      <label>会場</label>
      <select id="venue">
        <option value="">会場を選択</option>
        <option value="tokyo">東京ドーム</option>
        <option value="osaka">京セラドーム大阪</option>
        <option value="nagoya">バンテリンドーム ナゴヤ</option>
        <option value="fukuoka">みずほPayPayドーム福岡</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="field" id="other-venue-field" style="display:none;">
      <label>会場名（その他）</label>
      <input type="text" id="otherVenueName" placeholder="会場名を入力" />
    </div>
    <div class="field">
      <label>日付</label>
      <input type="date" id="date" />
    </div>
  </div>

  <div class="section-title">座席情報</div>
  <div class="card">
    <div class="field">
      <label>ゲート / 通路</label>
      <input type="text" id="gate" placeholder="例：A、1ゲート" />
    </div>
    <div class="field">
      <label>ブロック</label>
      <input type="text" id="block" placeholder="例：1塁側 / アリーナA" />
    </div>
    <div class="field">
      <label>列</label>
      <input type="text" id="row" placeholder="例：12列" />
    </div>
    <div class="field">
      <label>番号</label>
      <input type="text" id="seatNum" placeholder="例：15番" />
    </div>
    <div class="field">
      <label>メモ（席の感想など）</label>
      <textarea id="seatMemo" placeholder="例：ステージがよく見えた！"></textarea>
    </div>
  </div>

  <div class="section-title">費用</div>
  <div class="card" id="cost-card">
    <div id="cost-rows">
      <div class="cost-row" style="display:grid;grid-template-columns:1fr 1fr 36px;gap:8px;margin-bottom:8px;">
        <select class="cost-cat"><option value="ticket">チケット代</option><option value="goods">グッズ代</option><option value="travel">遠征費</option><option value="other">その他</option></select>
        <input type="number" class="cost-amount" placeholder="金額（円）" min="0" />
        <button onclick="removeCostRow(this)" style="border:none;background:none;color:var(--text-hint);font-size:1.2rem;cursor:pointer;">✕</button>
      </div>
    </div>
    <button onclick="addCostRow()" style="width:100%;padding:8px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);background:none;color:var(--text-sub);cursor:pointer;font-size:14px;">＋ 費用を追加</button>
  </div>

  <button class="btn-primary" id="btn-save" onclick="saveRecord()" style="margin-top:0.5rem;">保存する</button>
</main>

<nav class="bottom-nav">
  <a href="home.html" class="nav-item"><span class="nav-icon">&#x1F3E0;</span><span>ホーム</span></a>
  <a href="record.html" class="nav-item active"><span class="nav-icon">&#x2795;</span><span>記録追加</span></a>
  <a href="cost.html" class="nav-item"><span class="nav-icon">&#x1F4B0;</span><span>費用管理</span></a>
</nav>

<script type="module">
import { auth } from './js/firebase.js';
import { db } from './js/firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser = null;
document.getElementById('date').value = new Date().toISOString().split('T')[0];

onAuthStateChanged(auth, (user) => {
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;
});

document.getElementById('venue').addEventListener('change', function() {
  const venueNames = {tokyo:'東京ドーム',osaka:'京セラドーム大阪',nagoya:'バンテリンドーム ナゴヤ',fukuoka:'みずほPayPayドーム福岡'};
  document.getElementById('other-venue-field').style.display = this.value === 'other' ? '' : 'none';
});

window.addCostRow = function() {
  const row = document.createElement('div');
  row.className = 'cost-row';
  row.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 36px;gap:8px;margin-bottom:8px;';
  row.innerHTML = '<select class="cost-cat"><option value="ticket">チケット代</option><option value="goods">グッズ代</option><option value="travel">遠征費</option><option value="other">その他</option></select>' +
    '<input type="number" class="cost-amount" placeholder="金額（円）" min="0" />' +
    '<button onclick="removeCostRow(this)" style="border:none;background:none;color:var(--text-hint);font-size:1.2rem;cursor:pointer;">✕</button>';
  document.getElementById('cost-rows').appendChild(row);
};

window.removeCostRow = function(btn) {
  const rows = document.querySelectorAll('.cost-row');
  if (rows.length > 1) btn.parentElement.remove();
};

window.saveRecord = async function() {
  if (!currentUser) return;
  const venue = document.getElementById('venue').value;
  const venueNames = {tokyo:'東京ドーム',osaka:'京セラドーム大阪',nagoya:'バンテリンドーム ナゴヤ',fukuoka:'みずほPayPayドーム福岡'};
  const venueName = venue === 'other' ? document.getElementById('otherVenueName').value : (venueNames[venue] || '');
  const costs = [];
  document.querySelectorAll('.cost-row').forEach(row => {
    const cat = row.querySelector('.cost-cat').value;
    const amt = parseInt(row.querySelector('.cost-amount').value) || 0;
    if (amt > 0) costs.push({category: cat, amount: amt});
  });
  const data = {
    uid: currentUser.uid,
    artistName: document.getElementById('artistName').value.trim(),
    venue, venueName,
    date: document.getElementById('date').value,
    seat: {
      gate: document.getElementById('gate').value.trim(),
      block: document.getElementById('block').value.trim(),
      row: document.getElementById('row').value.trim(),
      number: document.getElementById('seatNum').value.trim(),
      memo: document.getElementById('seatMemo').value.trim()
    },
    costs,
    createdAt: serverTimestamp()
  };
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '保存中…';
  try {
    await addDoc(collection(db, 'records'), data);
    window.location.href = 'home.html';
  } catch(e) {
    const msg = document.getElementById('msg');
    msg.textContent = '保存に失敗しました。もう一度お試しください。';
    msg.className = 'msg error';
    btn.disabled = false; btn.textContent = '保存する';
    console.error(e);
  }
};
</script>
</body>
</html>
